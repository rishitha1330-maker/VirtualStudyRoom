<!DOCTYPE html>
<html>
<head>
<title>Virtual Study Room</title>

<style>
body{
margin: 0;
font-family: Arial, sans-serif;


background: linear-gradient(to right, #d9a7c7, #fffcdc);
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}


.container{
background: white;
padding: 40px;
border-radius: 15px;
text-align: center;
box-shadow: 0 10px 25px rgba(0,0,0,0.2);
width: 350px;
}


h1{
color: #6a0dad;
margin-bottom: 10px;
}


p{
color: #555;
margin-bottom: 25px;
}


button{
padding: 12px 25px;
font-size: 16px;
background: linear-gradient(to right, purple, violet);
color: white;
border: none;
border-radius: 25px;
cursor: pointer;
transition: 0.3s;
}


button:hover{
transform: scale(1.1);
box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<div class="container">

<h1>📚 Virtual Study Room</h1>
<p>Stay focused. Stay productive.</p>

<a href="login1.html">
<button>Go to Login</button>
</a>

</div>

</body>
</html>
