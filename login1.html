<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
margin: 0;
font-family: Arial, sans-serif;


background: linear-gradient(to right, #d9a7c7, #fffcdc);
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}


.container{
background: white;
padding: 40px;
border-radius: 15px;
text-align: center;
box-shadow: 0 10px 25px rgba(0,0,0,0.2);
width: 350px;
}


h2{
color: #6a0dad;
margin-bottom: 20px;
}


input{
width: 85%;
padding: 12px;
margin: 10px 0;
border-radius: 8px;
border: 1px solid #ccc;
outline: none;
font-size: 14px;
}


input:focus{
border-color: purple;
box-shadow: 0 0 5px rgba(128,0,128,0.5);
}


button{
padding: 12px 25px;
font-size: 16px;
background: linear-gradient(to right, purple, violet);
color: white;
border: none;
border-radius: 25px;
cursor: pointer;
transition: 0.3s;
margin-top: 10px;
}


button:hover{
transform: scale(1.1);
box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}


a{
display: block;
margin-top: 15px;
text-decoration: none;
color: #6a0dad;
font-size: 14px;
}

a:hover{
text-decoration: underline;
}
</style>

</head>

<body>

<div class="container">

<h2>🔐 Login</h2>

<form action="pro.html">

<input type="text" placeholder="Username" required><br>
<input type="password" placeholder="Password" required><br>

<button type="submit">Login</button>

</form>

<a href="home.html">← Back to Home</a>

</div>

</body>
</html>
